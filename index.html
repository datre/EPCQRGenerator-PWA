<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0066CC">
  <meta name="description" content="Generate EPC QR codes for SEPA Credit Transfers. Scan with any banking app to pre-fill payments.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>EPC QR Generator</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Create Tab -->
    <div id="view-create" class="view active">
      <div class="scroll-content">
        <div class="header-hero">
          <svg class="hero-icon" viewBox="0 0 24 24" width="64" height="64" fill="currentColor">
            <path d="M3 11h2v2H3v-2zm0-4h2v2H3V7zm4 4h2v2H7v-2zm0-4h2v2H7V7zm0-4h2v2H7V3zm4 8h2v2h-2v-2zm0-4h2v2h-2V7zm0-4h2v2h-2V3zM3 3h2v2H3V3zm14 8h2v2h-2v-2zm-2-2h2v2h-2V9zM3 15h2v2H3v-2zm12-2h2v2h-2v-2zm2-4h2v2h-2V7zm0-4h2v2h-2V3zm4 0h2v2h-2V3zm0 4h2v2h-2V7zm-8 8h2v2h-2v-2zm4 0h2v2h-2v-2zm4 0h2v2h-2v-2zm0-4h2v2h-2v-2zm0 8h2v2h-2v-2zm-4 0h2v2h-2v-2zm-4 0h2v2h-2v-2zm-4 0h2v2h-2v-2zm-4 0h2v2H3v-2zm8-4h2v2h-2v-2z"/>
          </svg>
          <h1>EPC QR Code Generator</h1>
          <p class="subtitle" data-i18n="simple_header_subtitle">Create SEPA payment QR codes</p>
        </div>

        <div class="card">
          <div class="form-group">
            <label data-i18n="simple_field_iban">IBAN</label>
            <div class="input-wrapper">
              <input type="text" id="iban" autocomplete="off" autocapitalize="characters"
                     data-placeholder-i18n="simple_field_iban_placeholder" placeholder="DE89 3704 0044 0532 0130 00">
              <span id="iban-icon" class="input-icon"></span>
            </div>
            <span id="iban-error" class="field-error" data-i18n="simple_field_iban_invalid">Invalid IBAN checksum</span>
          </div>

          <div class="form-group">
            <label data-i18n="simple_field_recipient">Recipient Name</label>
            <input type="text" id="recipient" autocomplete="name"
                   data-placeholder-i18n="simple_field_recipient_placeholder" placeholder="Max Mustermann">
          </div>

          <div class="form-group">
            <label data-i18n="simple_field_amount">Amount (Optional)</label>
            <div class="input-wrapper">
              <input type="text" id="amount" inputmode="decimal" placeholder="0.00">
              <span class="input-suffix">EUR</span>
            </div>
          </div>

          <div class="form-group">
            <label data-i18n="simple_field_reference">Payment Reference (Optional)</label>
            <input type="text" id="reference"
                   data-placeholder-i18n="simple_field_reference_placeholder" placeholder="Invoice 12345">
          </div>
        </div>

        <button id="btn-generate" class="btn btn-primary btn-full" disabled data-i18n="simple_button_generate">Generate QR Code</button>

        <div class="btn-row">
          <button id="btn-advanced" class="btn btn-outlined btn-half">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.611 3.611 0 0112 15.6z"/></svg>
            <span data-i18n="simple_button_advanced">Advanced</span>
          </button>
          <button id="btn-save-draft" class="btn btn-outlined btn-half" disabled>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
            <span data-i18n="simple_button_save">Save Draft</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Drafts Tab -->
    <div id="view-drafts" class="view">
      <div class="drafts-header">
        <h2 id="drafts-title" data-i18n="drafts_title">Saved Drafts</h2>
        <div class="drafts-actions">
          <button id="btn-new-folder" class="btn-icon" title="New Folder">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M20 6h-8l-2-2H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-1 8h-3v3h-2v-3h-3v-2h3V9h2v3h3v2z"/></svg>
          </button>
        </div>
      </div>
      <div class="search-bar">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="search-drafts" data-placeholder-i18n="drafts_search_prompt" placeholder="Search drafts">
        <button id="btn-clear-search" class="btn-icon search-clear" style="display:none">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div id="drafts-list" class="drafts-list"></div>
      <div id="drafts-empty" class="empty-state" style="display:none">
        <svg viewBox="0 0 24 24" width="80" height="80" fill="currentColor" class="empty-icon"><path d="M20 6h-8l-2-2H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm0 12H4V8h16v10z"/></svg>
        <h3 data-i18n="drafts_empty_title">No Saved Drafts</h3>
        <p data-i18n="drafts_empty_subtitle">Save payment details to quickly create QR codes later</p>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-tab="create">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M3 11h2v2H3v-2zm0-4h2v2H3V7zm4 4h2v2H7v-2zm0-4h2v2H7V7zm0-4h2v2H7V3zm4 8h2v2h-2v-2zm0-4h2v2h-2V7zm0-4h2v2h-2V3zM3 3h2v2H3V3zm14 8h2v2h-2v-2zm-2-2h2v2h-2V9zM3 15h2v2H3v-2zm12-2h2v2h-2v-2zm2-4h2v2h-2V7zm0-4h2v2h-2V3zm4 0h2v2h-2V3zm0 4h2v2h-2V7zm-8 8h2v2h-2v-2zm4 0h2v2h-2v-2zm4 0h2v2h-2v-2zm0-4h2v2h-2v-2zm0 8h2v2h-2v-2zm-4 0h2v2h-2v-2zm-4 0h2v2h-2v-2zm-4 0h2v2h-2v-2zm-4 0h2v2H3v-2zm8-4h2v2h-2v-2z"/></svg>
        <span data-i18n="tab_create">Create</span>
      </button>
      <button class="nav-item" data-tab="drafts">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
        <span data-i18n="tab_drafts">Drafts</span>
      </button>
    </nav>
  </div>

  <!-- QR Code Modal -->
  <div id="modal-qr" class="modal">
    <div class="modal-sheet">
      <div class="modal-header">
        <span></span>
        <h3 data-i18n="qr_title">QR Code</h3>
        <button class="btn-text modal-close" data-i18n="qr_button_done">Done</button>
      </div>
      <div class="modal-body" id="qr-modal-body"></div>
    </div>
  </div>

  <!-- Advanced Settings Modal -->
  <div id="modal-advanced" class="modal">
    <div class="modal-sheet">
      <div class="modal-header">
        <button class="btn-text modal-cancel" data-i18n="edit_button_cancel">Cancel</button>
        <h3 data-i18n="advanced_title">Advanced Settings</h3>
        <button class="btn-text modal-save-advanced" data-i18n="advanced_button_done">Done</button>
      </div>
      <div class="modal-body" id="advanced-modal-body"></div>
    </div>
  </div>

  <!-- Save Draft Dialog -->
  <div id="dialog-save-draft" class="dialog-overlay">
    <div class="dialog">
      <h3 data-i18n="simple_alert_save_title">Save Draft</h3>
      <input type="text" id="save-draft-name" data-placeholder-i18n="simple_alert_save_placeholder" placeholder="Draft Name">
      <div class="dialog-buttons">
        <button class="btn-text dialog-cancel" data-i18n="simple_alert_save_cancel">Cancel</button>
        <button class="btn-text dialog-confirm" data-i18n="simple_alert_save_confirm">Save</button>
      </div>
    </div>
  </div>

  <!-- New Folder Dialog -->
  <div id="dialog-new-folder" class="dialog-overlay">
    <div class="dialog">
      <h3 data-i18n="drafts_folder_new_title">New Folder</h3>
      <input type="text" id="new-folder-name" data-placeholder-i18n="drafts_folder_new_placeholder" placeholder="Folder Name">
      <div class="dialog-buttons">
        <button class="btn-text dialog-cancel" data-i18n="simple_alert_save_cancel">Cancel</button>
        <button class="btn-text dialog-confirm" data-i18n="simple_alert_save_confirm">Save</button>
      </div>
    </div>
  </div>

  <!-- Edit Draft Modal -->
  <div id="modal-edit-draft" class="modal">
    <div class="modal-sheet">
      <div class="modal-header">
        <button class="btn-text modal-cancel" data-i18n="edit_button_cancel">Cancel</button>
        <h3 data-i18n="edit_title">Edit Draft</h3>
        <div class="save-menu-wrapper">
          <button class="btn-text modal-save-edit" data-i18n="edit_button_save">Save</button>
        </div>
      </div>
      <div class="modal-body" id="edit-draft-body"></div>
    </div>
  </div>

  <!-- Move Draft Modal -->
  <div id="modal-move-draft" class="modal">
    <div class="modal-sheet modal-sheet-short">
      <div class="modal-header">
        <span></span>
        <h3 data-i18n="drafts_move_title">Move to Folder</h3>
        <span></span>
      </div>
      <div class="modal-body" id="move-draft-body"></div>
    </div>
  </div>

  <!-- Generic Info Dialog -->
  <div id="dialog-info" class="dialog-overlay">
    <div class="dialog">
      <h3 id="dialog-info-title">Information</h3>
      <p id="dialog-info-message"></p>
      <div class="dialog-buttons">
        <button class="btn-text dialog-confirm" data-i18n="advanced_info_ok">OK</button>
      </div>
    </div>
  </div>

  <!-- Confirm Delete Dialog -->
  <div id="dialog-confirm" class="dialog-overlay">
    <div class="dialog">
      <h3 id="dialog-confirm-title"></h3>
      <p id="dialog-confirm-message"></p>
      <div class="dialog-buttons">
        <button class="btn-text dialog-cancel" data-i18n="simple_alert_save_cancel">Cancel</button>
        <button class="btn-text dialog-confirm-btn danger"></button>
      </div>
    </div>
  </div>

  <!-- Rename Folder Dialog -->
  <div id="dialog-rename-folder" class="dialog-overlay">
    <div class="dialog">
      <h3 data-i18n="drafts_folder_rename_title">Rename Folder</h3>
      <input type="text" id="rename-folder-name" data-placeholder-i18n="drafts_folder_new_placeholder" placeholder="Folder Name">
      <div class="dialog-buttons">
        <button class="btn-text dialog-cancel" data-i18n="simple_alert_save_cancel">Cancel</button>
        <button class="btn-text dialog-confirm" data-i18n="simple_alert_save_confirm">Save</button>
      </div>
    </div>
  </div>

  <!-- Context Menu -->
  <div id="context-menu" class="context-menu" style="display:none"></div>
  <div id="context-overlay" class="context-overlay" style="display:none"></div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/iban.js"></script>
  <script src="js/epc.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
